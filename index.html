<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary meta -->
    <title>PetSmart Reviews – Dog & Cat Product Reviews & Guides</title>
    <meta name="description" content="Honest PetSmart product reviews, buying guides, and expert tips for dog and cat owners." />
    <meta name="author" content="PetSmart Reviews" />
    <meta name="keywords" content="PetSmart reviews, dog product reviews, cat product reviews, pet supplies, dog food reviews, cat food reviews, pet care guides" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://www.petsmartreviews.com/" />

    <!-- Favicon & app icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="PetSmart Reviews – Dog & Cat Product Reviews & Guides" />
    <meta property="og:description" content="Honest PetSmart product reviews, buying guides, and expert tips for dog and cat owners." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.petsmartreviews.com/" />
    <meta property="og:image" content="https://www.petsmartreviews.com/hero-section.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="PetSmart Reviews" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PetSmart Reviews – Dog & Cat Product Reviews & Guides" />
    <meta name="twitter:description" content="Honest PetSmart product reviews, buying guides, and expert tips for dog and cat owners." />
    <meta name="twitter:image" content="https://www.petsmartreviews.com/hero-section.png" />

    <!-- Theme & mobile -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Sitemap for crawlers -->
    <link rel="sitemap" type="application/xml" href="https://www.petsmartreviews.com/sitemap.xml" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PetSmart Reviews",
      "url": "https://www.petsmartreviews.com",
      "description": "Honest PetSmart product reviews, buying guides, and expert tips for dog and cat owners.",
      "publisher": {
        "@type": "Organization",
        "name": "PetSmart Reviews",
        "url": "https://www.petsmartreviews.com"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://www.petsmartreviews.com/?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
